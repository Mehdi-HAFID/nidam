## Custom properties to ease configuration overrides
## on command-line or IDE launch configurations
host: http://localhost
reverse-proxy-port: 7080

react-port: 4001
react-prefix: /react-ui
react-uri: ${host}:${react-port}${react-prefix}

authorization-server-port: 4002
authorization-server-prefix: /auth
authorization-server-uri: ${host}:${authorization-server-port}${authorization-server-prefix}

bff-port: 7081
bff-prefix: /bff
bff-uri: ${host}:${bff-port}

server:
  port: ${reverse-proxy-port}
  forward-headers-strategy: framework
management:
  endpoints:
    access:
      default: none

spring:
  config:
    import: optional:file:./configuration.yml
  cloud:
    gateway:
      server:
        webflux:
          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
            - AddResponseHeader=X-Frame-Options, DENY
            - AddResponseHeader=X-Content-Type-Options, nosniff
            - AddResponseHeader=Referrer-Policy, no-referrer
          routes:
            # SPAs assets
            - id: react-ui
              uri: ${react-uri}
              predicates:
                - Path=${react-prefix}/**       # Changed because of docker: last chance
              filters:
                - PreserveHostHeader    #  must explicitly enable forwarded header handling
                # next: tells the downstream application (like your authorization server or BFF) what the original scheme of the client request was — usually either http or https
                - AddRequestHeader=X-Forwarded-Proto, http
            # Authorization-server
            - id: authorization-server
              uri: ${authorization-server-uri}
              predicates:
                - Path=${authorization-server-prefix}/**
              filters:
                - PreserveHostHeader            # Without PreserveHostHeader, the forwarded Host becomes localhost:4002
                - AddRequestHeader=X-Forwarded-Proto, http
            # BFF
            - id: bff
              uri: ${bff-uri}
              predicates:
                - Path=${bff-prefix}/**
              filters:
                - StripPrefix=1
                - PreserveHostHeader
                - AddRequestHeader=X-Forwarded-Proto, http
#trace: true