host: http://localhost
reverse-proxy-port: 7080
reverse-proxy-uri: ${host}:${reverse-proxy-port}      # because of docker logout, do not override in compose

authorization-server-name: token-generator
authorization-server-prefix: /auth
issuer: ${reverse-proxy-uri}${authorization-server-prefix}


client:
  id: client
  secret: secret

bff-port: 7081
bff-prefix: /bff
bff-proxy-uri: ${reverse-proxy-uri}${bff-prefix}
bff-post-logout-endpoint: /post-logout

react-prefix: /react-ui
react-proxy-uri: ${reverse-proxy-uri}${react-prefix}   # also changed because of docker

resource-server-port: 4003
resource-server-uri: ${host}:${resource-server-port}

logout:
  auth-server-uri: ${issuer}/connect/logout
  token-hint-param-name: id_token_hint
  post-redirect-param-name: post_logout_redirect_uri
  client-id-param-name: client_id
  success-redirect-header: X-POST-LOGOUT-SUCCESS-URI
  success-redirect-default-uri: ${react-proxy-uri}
  bff-post-logout-uri: ${bff-proxy-uri}${bff-post-logout-endpoint}
  allowed-redirect-uri-prefixes: ${react-proxy-uri}
    # in the global configuration.yml you can set it like: allowed-redirect-uri-prefixes: http://a,http://b,http://c

login:
  success-redirect-param-name: post_login_success_uri
  session-redirect-uri-attribute: POST_LOGIN_SUCCESS_URI
  allowed-redirect-uri-prefixes: ${react-proxy-uri}


server:
  port: ${bff-port}
  forward-headers-strategy: framework
management:
  endpoints:
    access:
      default: none

bff-redirect-call-to-resource-server-predicate: /api/**

spring:
  config:
    import: optional:file:./configuration.yml
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: bff
              uri: ${resource-server-uri}
              predicates:
                - Path=${bff-redirect-call-to-resource-server-predicate}
              filters:
                - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
                - TokenRelay=
                - SaveSession
                - StripPrefix=1
  security:
    oauth2:
      client:
        provider:
          token-generator:
            issuer-uri: ${issuer}
            authorization-uri: ${issuer}/oauth2/authorize # Explanation below
        registration:
          token-generator:
            provider: token-generator
            authorization-grant-type: authorization_code
            client-id: ${client.id}
            client-secret: ${client.secret}
            scope: openid
            redirect-uri: ${bff-proxy-uri}/login/oauth2/code/${authorization-server-name}

              #            Spring Security’s issuer-uri is used for both:
              # Discovery at startup (server-to-server call from BFF → Auth Server)
              # and Building browser-facing redirect URLs
              # You need to split the two concerns:
              # Internal service-to-service URL (Docker network hostname, e.g. reverse-proxy:7080)
              # External/public URL (what the browser should see, e.g. localhost:7080 in dev)
              # this achieved by using reverse-proxy in docker-compose.yml
              # and setting spring.security.oauth2.client.provider.token-generator.authorization-uri with localhost since it is browser facing

#trace: true